version: "3.8"

services:
  # Gradio Web UI
  typhoon-ocr-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: typhoon-ocr-app-prod
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - USE_REMOTE=true
      - API_PORT=8000
    volumes:
      - ./examples:/app/examples
    restart: always

  # FastAPI Server
  typhoon-ocr-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: typhoon-ocr-api-prod
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always
